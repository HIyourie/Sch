<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>試作掲示板卍</h1>
    <br>
    <div id="threads"></div>
    <br>
    <input placeholder="スレタイを入力" id="title">
    <br>
    <textarea placeholder="本文を入力" id="text"></textarea>
    <br>
    <button onclick="post()">投稿する</button>
    <script>
function post(){
const title = document.createElement("a")
title.href = "Sch" + Math.floor(Math.random() * 1000)
    title.innerHTML = document.getElementById("title").value
    document.getElementById("threads").appendChild(title)

}
</script>
</body>
</html>
